name: Release

on:
  push:
    tags:
      - v*
  release:
    types: [released]
  workflow_dispatch:

permissions: {}

jobs:
  wasm:
    name: Build WASM
    runs-on: ubuntu-24.04
    concurrency:
      group: release-wasm-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Build
        run: npm run build

      - name: Upload escrow.wasm.gz
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: escrow.wasm.gz
          path: ./target/wasm32-unknown-unknown/release/escrow.wasm.gz

  candid:
    name: Generate Candid
    runs-on: ubuntu-24.04
    concurrency:
      group: release-candid-${{ github.ref }}-${{ matrix.target }}
      cancel-in-progress: true
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - name: escrow.did
            target: escrow

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 'Upload ${{ matrix.name }}'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.name }}
          path: ./src/${{ matrix.target }}/${{ matrix.name }}

  release:
    name: Publish Release
    runs-on: ubuntu-24.04
    concurrency:
      group: release-publish-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write # Required to create/update the GitHub Release and/or upload release assets.
    needs: ['wasm', 'candid']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download escrow.wasm.gz
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: escrow.wasm.gz
          path: .

      - name: Download escrow.did
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: escrow.did
          path: .

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./escrow.wasm.gz
            ./escrow.did
