name: Prepare

description: Checkout and install dependencies

runs:
  using: composite
  steps:
    - name: Setup node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.node-version'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Install rust
      shell: bash
      run: scripts/setup rust

    - name: Install shfmt
      shell: bash
      run: scripts/setup shfmt

    - name: Install binstall
      shell: bash
      run: scripts/setup cargo-binstall

    - name: Install cargo dependency sorter
      shell: bash
      run: cargo binstall --no-confirm cargo-sort@1.0.9

    - name: Install zizmor
      shell: bash
      run: scripts/setup zizmor

    - name: Install yq
      shell: bash
      run: scripts/setup yq
